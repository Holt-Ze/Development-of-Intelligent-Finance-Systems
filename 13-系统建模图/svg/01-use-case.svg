<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1050">
  <defs>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .system { fill: none; stroke: #93c5fd; stroke-width: 2; }
      .actor { fill: #fff; stroke: #475569; stroke-width: 2; rx: 10; }
      .admin { fill: #fff7ed; stroke: #d97706; }
      .finance { fill: #e0f2fe; stroke: #2563eb; }
      .usecase { fill: #fff; stroke: #334155; stroke-width: 2; }
      .text { font: 15px sans-serif; fill: #334155; }
      .name { font: 700 16px sans-serif; fill: #111827; }
      .line { stroke: #475569; stroke-width: 2; fill: none; }
      .include { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1700" height="1050" fill="#ffffff"/>
  <text x="850" y="56" text-anchor="middle" class="title">学校部门财务管理系统用例图</text>

  <rect x="220" y="100" width="1420" height="890" rx="18" class="system"/>
  <text x="930" y="136" text-anchor="middle" class="title" style="font-size:24px;">财务管理系统</text>

  <rect x="40" y="180" width="120" height="70" class="actor admin"/>
  <text x="100" y="208" text-anchor="middle" class="text">&lt;&lt;Actor&gt;&gt;</text>
  <text x="100" y="234" text-anchor="middle" class="name">管理员</text>

  <rect x="40" y="760" width="120" height="70" class="actor finance"/>
  <text x="100" y="788" text-anchor="middle" class="text">&lt;&lt;Actor&gt;&gt;</text>
  <text x="100" y="814" text-anchor="middle" class="name">财务员</text>

  <ellipse cx="420" cy="190" rx="95" ry="30" class="usecase"/>
