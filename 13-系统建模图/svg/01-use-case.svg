  <ellipse cx="420" cy="410" rx="95" ry="30" class="usecase"/>
  <text x="420" y="416" text-anchor="middle" class="name">部门管理</text>

  <ellipse cx="420" cy="520" rx="95" ry="30" class="usecase"/>
  <text x="420" y="526" text-anchor="middle" class="name">账户管理</text>

  <ellipse cx="420" cy="630" rx="110" ry="30" class="usecase"/>
  <text x="420" y="636" text-anchor="middle" class="name">收入类别管理</text>

  <ellipse cx="420" cy="740" rx="110" ry="30" class="usecase"/>
  <text x="420" y="746" text-anchor="middle" class="name">支出类别管理</text>

  <ellipse cx="760" cy="410" rx="110" ry="30" class="usecase"/>
