  <path class="line" d="M160 795 V190 H325"/>

  <path class="include" d="M515 410 H650 V410 H650 V410 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H650 H665" marker-end="url(#arrow)"/>
  <text x="560" y="392" class="text">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M515 520 H665" marker-end="url(#arrow)"/>
  <text x="560" y="502" class="text">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M530 630 H665" marker-end="url(#arrow)"/>
  <text x="565" y="612" class="text">&lt;&lt;include&gt;&gt;</text>

