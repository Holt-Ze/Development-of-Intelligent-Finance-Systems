  <text x="565" y="722" class="text">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M1040 360 V420" marker-end="url(#arrow)"/>
  <text x="940" y="394" class="text">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M1040 500 V570 H1230" marker-end="url(#arrow)"/>
  <text x="1115" y="550" class="text">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M1175 610 H1230" marker-end="url(#arrow)"/>
